# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - TestAzureApi-prod-Zohair

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore TestAzureApi/TestAzureApi.csproj

      - name: Build with dotnet
        run: dotnet build TestAzureApi/TestAzureApi.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish TestAzureApi/TestAzureApi.csproj --configuration Release --no-build --output "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp


  deploy_and_swap_to_production:
    name: Deploy staging slot and swap to production
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_62FEF47F8DBC4D99AD4C2D84083E2E8E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_67A25D5F648B444EAFA888DCAF9F3C51 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7486B3BED5B04B5DA98AD362CB0E8182 }}

      # Deploy to staging slot first, not production.
      - name: Deploy to Azure Web App staging slot
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TestAzureApi-prod-Zohair'
          slot-name: 'staging'
          package: .

      # Health check on staging slot before swap.
      - name: Health check on staging slot
        run: |
          Start-Sleep -Seconds 30
          $response = Invoke-WebRequest `
            -Uri "https://testazureapi-prod-zohair-staging.azurewebsites.net/health" `
            -UseBasicParsing `
            -TimeoutSec 30
          if ($response.StatusCode -ne 200) {
            Write-Error "Health check failed on staging slot"
            exit 1
          }
          Write-Host "Health check passed on staging slot"
        shell: powershell

      # Swap staging slot to production.
      - name: Swap staging to production
        run: |
          az webapp deployment slot swap `
            --resource-group rg-TestAzureApi-prod `
            --name TestAzureApi-prod-Zohair `
            --slot staging `
            --target-slot production
        shell: powershell

      - name: Verify production after swap
        run: |
          Start-Sleep -Seconds 15
          $response = Invoke-WebRequest `
            -Uri "https://testazureapi-prod-zohair.azurewebsites.net/health" `
            -UseBasicParsing `
            -TimeoutSec 30
          if ($response.StatusCode -ne 200) {
            Write-Error "Health check failed on production after swap"
            exit 1
          }
          Write-Host "Production health check passed after swap"
        shell: powershell
