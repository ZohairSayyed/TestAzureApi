name: Build and deploy ASP.Net Core app to IIS on Azure VM

on:
  push:
    branches:
      - iis-deploy

  workflow_dispatch:

jobs:

  # ════════════════════════════════════════════
  # JOB 1 — BUILD
  # ════════════════════════════════════════════
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build application
        run: dotnet build --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish --configuration Release --output ./publish --no-build

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iis-app
          path: ./publish

  # ════════════════════════════════════════════
  # JOB 2 — DEPLOY TO IIS
  # ════════════════════════════════════════════
  deploy:
    runs-on: windows-latest
    needs: build

    steps:

      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: iis-app
          path: ./publish

      - name: Deploy to IIS on Azure VM
        shell: powershell
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          VM_PASSWORD: ${{ secrets.VM_PASSWORD }}

        run: |

          Write-Host "Starting deployment..."

          # ─────────────────────────────────────
          # TLS 1.2
          # ─────────────────────────────────────
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          # ─────────────────────────────────────
          # Secure credentials
          # ─────────────────────────────────────
          $password = ConvertTo-SecureString $env:VM_PASSWORD -AsPlainText -Force

          $credential = New-Object System.Management.Automation.PSCredential(
            $env:VM_USERNAME,
            $password
          )

          # ─────────────────────────────────────
          # Create remote PowerShell session
          # ─────────────────────────────────────
          $sessionOption = New-PSSessionOption `
            -SkipCACheck `
            -SkipCNCheck `
            -SkipRevocationCheck

          $session = New-PSSession `
            -ComputerName $env:VM_HOST `
            -Credential $credential `
            -UseSSL `
            -Port 5986 `
            -Authentication Basic `
            -SessionOption $sessionOption

          Write-Host "Connected to VM successfully"

          # ─────────────────────────────────────
          # Create folders if not exists
          # ─────────────────────────────────────
          Invoke-Command -Session $session -ScriptBlock {

            if (-not (Test-Path "C:\inetpub\AzureTestApi")) {
              New-Item `
                -ItemType Directory `
                -Path "C:\inetpub\AzureTestApi" `
                -Force
            }

            if (-not (Test-Path "C:\inetpub\backups")) {
              New-Item `
                -ItemType Directory `
                -Path "C:\inetpub\backups" `
                -Force
            }
          }

          # ─────────────────────────────────────
          # Backup existing deployment
          # ─────────────────────────────────────
          Invoke-Command -Session $session -ScriptBlock {

            $timestamp = Get-Date -Format "yyyy-MM-dd_HH-mm-ss"

            $backupPath = "C:\inetpub\backups\$timestamp"

            if (Test-Path "C:\inetpub\AzureTestApi") {

              Copy-Item `
                -Path "C:\inetpub\AzureTestApi\*" `
                -Destination $backupPath `
                -Recurse `
                -Force `
                -ErrorAction SilentlyContinue

              Write-Host "Backup created: $backupPath"
            }
          }
          
          # ─────────────────────────────────────
          # Cleanup old backups (keep last 5 only)
          # ─────────────────────────────────────
          Invoke-Command -Session $session -ScriptBlock {

            $backupRoot = "C:\inetpub\backups"
            $allBackups = Get-ChildItem $backupRoot | 
                        Sort-Object CreationTime -Descending

            # Keep latest 5, delete the rest
            if ($allBackups.Count -gt 5) {
              $allBackups | Select-Object -Skip 5 | ForEach-Object {
                Remove-Item $_.FullName -Recurse -Force
                Write-Host "Deleted old backup: $($_.Name)"
              }
            }
          }

          # ─────────────────────────────────────
          # Stop IIS website
          # ─────────────────────────────────────
          Invoke-Command -Session $session -ScriptBlock {

            Import-Module WebAdministration

            if ((Get-Website "AzureTestApi").State -eq "Started") {

              Stop-Website -Name "AzureTestApi"

              Write-Host "IIS site stopped"
            }
          }

          # ─────────────────────────────────────
          # Remove old deployment files
          # ─────────────────────────────────────
          Invoke-Command -Session $session -ScriptBlock {

            Remove-Item `
              -Path "C:\inetpub\AzureTestApi\*" `
              -Recurse `
              -Force `
              -ErrorAction SilentlyContinue
          }

          # ─────────────────────────────────────
          # Copy new files
          # ─────────────────────────────────────
          Write-Host "Copying files to VM..."

          Copy-Item `
            -Path "./publish/*" `
            -Destination "C:\inetpub\AzureTestApi" `
            -ToSession $session `
            -Recurse `
            -Force

          Write-Host "Files copied successfully"

          # ─────────────────────────────────────
          # Start IIS website
          # ─────────────────────────────────────
          Invoke-Command -Session $session -ScriptBlock {

            Import-Module WebAdministration

            Start-Website -Name "AzureTestApi"

            Write-Host "IIS site started"
          }

          # ─────────────────────────────────────
          # Deployment validation
          # ─────────────────────────────────────

          # Variables must NOT be commented out
          $deploymentSucceeded = $false
          $rollbackPerformed = $false

          try {

              Write-Host "Running health check..."

              # Health check runs on VM
              $healthResult = Invoke-Command -Session $session -ScriptBlock {

                  Start-Sleep -Seconds 10

                  try {
                      $response = Invoke-WebRequest `
                          -Uri "http://localhost:8080/health" `
                          -UseBasicParsing `
                          -TimeoutSec 30

                      return $response.StatusCode
                  }
                  catch {
                      return 500
                  }
              }

              if ($healthResult -ne 200) {
                  throw "Health check failed with status: $healthResult"
              }

              $deploymentSucceeded = $true
              Write-Host "Health check successful — Status: $healthResult"
          }
          catch {

              $errorMsg = $_.ToString()
              Write-Host "Deployment validation failed: $errorMsg"
              Write-Host "Starting rollback..."

              $rollbackPerformed = $true

              # Check session is still open before rollback
              if ($session.State -eq "Opened") {

                  Invoke-Command -Session $session -ScriptBlock {

                      Import-Module WebAdministration

                      # Stop IIS
                      Stop-Website -Name "AzureTestApi"
                      Stop-WebAppPool -Name "AzureTestApi"

                      Start-Sleep -Seconds 5

                      # Remove failed deployment
                      Remove-Item `
                          -Path "C:\inetpub\AzureTestApi\*" `
                          -Recurse `
                          -Force `
                          -ErrorAction SilentlyContinue

                      # Restore latest backup
                      $latestBackup = Get-ChildItem "C:\inetpub\backups" |
                                      Sort-Object CreationTime -Descending |
                                      Select-Object -First 1

                      if ($latestBackup) {
                          Copy-Item `
                              -Path "$($latestBackup.FullName)\*" `
                              -Destination "C:\inetpub\AzureTestApi" `
                              -Recurse `
                              -Force
                          Write-Host "Restored from backup: $($latestBackup.Name)"
                      }
                      else {
                          Write-Host "No backup found to restore"
                      }

                      # Restart IIS
                      Start-WebAppPool -Name "AzureTestApi"
                      Start-Website -Name "AzureTestApi"

                      Write-Host "Rollback completed"
                  }
              }
              else {
                  Write-Host "Session closed — cannot perform rollback"
              }
          }
          finally {

              # ─────────────────────────────────────
              # Deployment summary
              # ─────────────────────────────────────

              # Check session before using it in finally
              if ($session -and $session.State -eq "Opened") {

                  Invoke-Command -Session $session -ScriptBlock {

                      Import-Module WebAdministration

                      Write-Host "════════════════════════════════"
                      Write-Host "Deployment Summary"
                      Write-Host "════════════════════════════════"
                      Write-Host "Site: AzureTestApi"
                      Write-Host "Status: $((Get-Website 'AzureTestApi').State)"
                      Write-Host "Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
                      Write-Host "════════════════════════════════"
                  }

                  # Cleanup session
                  Remove-PSSession $session
              }

              # Summary on GitHub Actions log
              if ($deploymentSucceeded) {
                  Write-Host "Deployment completed successfully"
              }

              if ($rollbackPerformed) {
                  Write-Host "Rollback executed — stable version restored"
                  exit 1
              }
          }