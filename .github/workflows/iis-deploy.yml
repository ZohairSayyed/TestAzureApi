# ============================================
# IIS Deployment Pipeline
# Triggers on push to iis-deploy branch only
# Includes backup of current running version
# ============================================

name: Build and deploy ASP.Net Core app to IIS on Azure VM

# ── TRIGGER ──────────────────────────────────
on:
  push:
    branches:
      - iis-deploy      # Only triggers on iis-deploy branch
                        # master branch stays for App Service pipeline
  workflow_dispatch:    # Manual trigger button on GitHub Actions tab

# ── JOBS ─────────────────────────────────────
jobs:

  # ════════════════════════════════════════════
  # JOB 1 — BUILD
  # Compiles and packages your .NET 8 API
  # ════════════════════════════════════════════
  build:
    runs-on: windows-latest   # Fresh Windows machine on GitHub's servers

    permissions:
      contents: read          # Only needs to read your code

    steps:

      # Step 1 — Download your code onto the machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install .NET 8 SDK
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Step 3 — Compile in Release mode
      # If compile errors exist — pipeline stops here, nothing deploys
      - name: Build
        run: dotnet build --configuration Release

      # Step 4 — Package app with all dependencies into one folder
      # This is what actually gets deployed to IIS
      - name: Publish
        run: dotnet publish -c Release -o ./publish

      # Step 5 — Upload packaged app to GitHub's temporary storage
      # Deploy job (different machine) will download it from here
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iis-app           # Name of the package
          path: ./publish         # Folder to upload

# ════════════════════════════════════════════
  # JOB 2 — DEPLOY
  # Backs up current version, then deploys new version
  # Only runs if build job succeeded
  # ════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest        # Linux middleman runner
    needs: build                  

    steps:

      # Step 1 — Download the package built in Job 1
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: iis-app
          path: ./publish

      # Step 2 — Connect to VM and take backup of current version
      - name: Backup current deployment
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cmd /c "if not exist C:\inetpub\backups mkdir C:\inetpub\backups"
            cmd /c "for /f \"tokens=1-6 delims=:-. \" %%a in (\"%DATE% %TIME%\") do if exist C:\inetpub\AzureTestApi (xcopy \"C:\inetpub\AzureTestApi\*\" \"C:\inetpub\backups\%%c-%%b-%%a_%%d-%%e-%%f\ \" /E /I /H /Y)"

      # Step 3 — Stop IIS site before replacing files
      - name: Stop IIS site
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cmd /c "%windir%\system32\inetsrv\appcmd stop site /site.name:\"AzureTestApi\""

      # Step 4 — Copy new files to IIS folder
      - name: Deploy new version
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          source: "./publish/*"
          target: "C:/inetpub/AzureTestApi"
          overwrite: true         

      # Step 5 — Start IIS site with new files
      - name: Start IIS site
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cmd /c "%windir%\system32\inetsrv\appcmd start site /site.name:\"AzureTestApi\""

      # Step 6 — Verify deployment by hitting health check endpoint
      - name: Verify deployment
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cmd /c "timeout /t 10 /nobreak && curl http://localhost:8080/health"