name: Build and deploy ASP.Net Core app to IIS on Azure VM

on:
  push:
    branches:
      - iis-deploy
  workflow_dispatch:

jobs:

  # ════════════════════════════════════════════
  # JOB 1 — BUILD (identical to App Service pipeline)
  # ════════════════════════════════════════════
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iis-app
          path: ./publish

  # ════════════════════════════════════════════
  # JOB 2 — DEPLOY
  # Uses PowerShell remoting (works on windows-latest)
  # ════════════════════════════════════════════
  deploy:
    runs-on: windows-latest
    needs: build

    steps:

      # Step 1 — Download artifact from build job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: iis-app
          path: ./publish

      # Step 2 — Backup + Stop + Deploy + Start via PowerShell remoting
      - name: Deploy to IIS on VM
        shell: powershell
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
          VM_PASSWORD: ${{ secrets.VM_PASSWORD }}
        run: |
          # ── Setup secure password and credentials ──
          $password = ConvertTo-SecureString $env:VM_PASSWORD -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential($env:VM_USERNAME, $password)

          # ── Create PS Session to VM ──
          $sessionOption = New-PSSessionOption -SkipCACheck -SkipCNCheck -SkipRevocationCheck
          $session = New-PSSession -ComputerName $env:VM_HOST `
                                   -Credential $credential `
                                   -UseSSL:$false `
                                   -SessionOption $sessionOption `
                                   -Authentication Basic

          # ── Step A: Backup current deployment ──
          Invoke-Command -Session $session -ScriptBlock {
            $timestamp = Get-Date -Format "yyyy-MM-dd_HH-mm-ss"
            $backupPath = "C:\inetpub\backups\$timestamp"

            # Create backups folder if not exists
            if (-not (Test-Path "C:\inetpub\backups")) {
              New-Item -ItemType Directory -Path "C:\inetpub\backups"
              Write-Host "Created backups folder"
            }

            # Copy current deployment to backup
            if (Test-Path "C:\inetpub\AzureTestApi") {
              Copy-Item -Path "C:\inetpub\AzureTestApi" `
                        -Destination $backupPath `
                        -Recurse -Force
              Write-Host "Backup created at: $backupPath"
            } else {
              Write-Host "No existing deployment - skipping backup"
            }
          }

          # ── Step B: Stop IIS site ──
          Invoke-Command -Session $session -ScriptBlock {
            & "$env:windir\system32\inetsrv\appcmd" stop site /site.name:"AzureTestApi"
            Write-Host "IIS site stopped"
          }

          # ── Step C: Copy new files to VM ──
          Write-Host "Copying new files to VM..."
          Copy-Item -Path "./publish/*" `
                    -Destination "C:\inetpub\AzureTestApi" `
                    -ToSession $session `
                    -Recurse -Force
          Write-Host "Files copied successfully"

          # ── Step D: Start IIS site ──
          Invoke-Command -Session $session -ScriptBlock {
            & "$env:windir\system32\inetsrv\appcmd" start site /site.name:"AzureTestApi"
            Write-Host "IIS site started"
          }

          # ── Step E: Verify deployment ──
          Invoke-Command -Session $session -ScriptBlock {
            Start-Sleep -Seconds 10
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/health" -UseBasicParsing
              Write-Host "Health check passed: $($response.StatusCode)"
            } catch {
              Write-Host "Health check failed: $_"
              exit 1
            }
          }

          # ── Cleanup session ──
          Remove-PSSession $session
          Write-Host "Deployment complete!"